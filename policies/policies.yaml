policies:
  - name: block_dangerous_tools
    description: "Block globally dangerous tools regardless of parameters"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - execute_code
        - delete_database
        - drop_table
        - shell_exec
        - rm_rf
    action: deny
    active: true
    severity: critical
    compliance_tags: ["SOC2"]

  - name: require_review_for_external_calls
    description: Flag any tool that makes external HTTP requests for human review
    rule_type: tool_pattern
    condition:
      tool_name_contains: ["http_request", "webhook", "external_api"]
    action: review
    severity: high
    compliance_frameworks: ["SOC2"]

  - name: allow_standard_tools
    description: Allow all other tools by default
    rule_type: default_allow
    condition: {}
    action: allow
    severity: low
    compliance_frameworks: []

# ── Demo scenario policies ────────────────────────────────────────────────────

  - name: deny_bulk_credit_query
    description: "Block wildcard applicant_id in credit bureau queries — lending demo"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - query_credit_bureau
      parameter_match:
        applicant_id: "*"
    action: deny
    active: true
    severity: critical
    compliance_tags: ["GLBA", "OCC", "SOC2"]

  - name: block_unapproved_outbound_http
    description: "Block outbound HTTP to unapproved external domains — manufacturing demo"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - http_post
        - http_request
    action: deny
    active: true
    severity: critical
    compliance_tags: ["SOC2", "ISO27001"]

  - name: deny_cross_encounter_phi_access
    description: "Block PHI access to patients outside authorized encounter cohort"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - read_patient_record
      parameter_match:
        patient_id: "PT-2024-09*"
    action: deny
    active: true
    severity: critical
    compliance_tags: ["HIPAA", "SOC2"]

  - name: deny_bulk_account_lookup
    description: "Block wildcard account_id in customer account queries — support demo"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - read_customer_account
      parameter_match:
        account_id: "*"
    action: deny
    active: true
    severity: critical
    compliance_tags: ["GDPR", "SOC2", "CCPA"]

  - name: block_http_post_in_itsm
    description: "Block all outbound HTTP POST from incident response agent — ITSM demo"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - http_post
    action: deny
    active: true
    severity: critical
    compliance_tags: ["SOC2", "NIST_CSF"]

  - name: deny_unscoped_crm_query
    description: "Block unfiltered account queries from CRM agent — RevOps demo"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - query_all_accounts
      parameter_match:
        filter: null
    action: deny
    active: true
    severity: high
    compliance_tags: ["GDPR", "SOC2", "CCPA"]
