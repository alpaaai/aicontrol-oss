policies:
  - name: block_dangerous_tools
    description: "Block globally dangerous tools regardless of parameters"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - execute_code
        - delete_database
        - drop_table
        - shell_exec
        - rm_rf
    action: deny
    active: true
    severity: critical
    compliance_frameworks: ["SOC2"]

  - name: require_review_for_external_calls
    description: Flag any tool that makes external HTTP requests for human review
    rule_type: tool_pattern
    condition:
      tool_name_contains: ["http_request", "webhook", "external_api"]
    action: review
    severity: high
    compliance_frameworks: ["SOC2"]

  - name: block_unapproved_outbound_http
    description: "Block outbound HTTP POST/request calls to unapproved external destinations"
    rule_type: tool_denylist
    condition:
      blocked_tools:
        - http_post
        - http_request
    action: deny
    active: true
    severity: critical
    compliance_frameworks: ["SOC2", "ISO27001"]

  - name: allow_standard_tools
    description: Allow all other tools by default
    rule_type: default_allow
    condition: {}
    action: allow
    severity: low
    compliance_frameworks: []

  # ── Example policies (inactive — activate per customer) ────────────────────

  - name: example_high_value_loan_review
    description: "Flag loan approvals over $500k for human review — lending example"
    rule_type: tool_denylist
    condition:
      blocked_tools: [approve_loan]
      numeric_conditions:
        - parameter: loan_amount
          operator: gt
          value: 500000
    action: review
    severity: high
    compliance_frameworks: ["SOC2", "GLBA"]
    active: false

  - name: example_bulk_revenue_export_deny
    description: "Deny unscoped account queries requesting revenue fields — RevOps example"
    rule_type: tool_denylist
    condition:
      blocked_tools: [query_all_accounts]
      all_of:
        - parameter_match:
            filter: "null"
        - numeric_conditions:
            - parameter: limit
              operator: gte
              value: 1000
    action: deny
    severity: critical
    compliance_frameworks: ["GDPR", "SOC2"]
    active: false

  - name: example_no_weekend_production_changes
    description: "Block production changes on weekends — ITSM example"
    rule_type: tool_denylist
    condition:
      blocked_tools: [deploy_to_production, restart_service, apply_config_patch]
      time_conditions:
        deny_days: [5, 6]
    action: deny
    severity: high
    compliance_frameworks: ["SOC2"]
    active: false

  - name: example_phi_access_all_variants
    description: "Block PHI access outside encounter cohort — covers all tool name variants"
    rule_type: tool_denylist
    condition:
      blocked_tools: [read_patient_record]
      tool_aliases: [queryPatientRecord, get_patient_data, fetch_patient_record, getPatientRecord]
      parameter_match:
        patient_id: "PT-2024-09*"
    action: deny
    severity: critical
    compliance_frameworks: ["HIPAA"]
    active: false
