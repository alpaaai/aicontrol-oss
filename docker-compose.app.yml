services:
  api:
    image: ghcr.io/alpaaai/aicontrol-api:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    volumes:
      - reports_data:/app/reports
    healthcheck:
      test: ["CMD-SHELL",
             "python3 -c \"import httpx; httpx.get('http://localhost:8001/health').raise_for_status()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aicontrol

  dashboard:
    image: ghcr.io/alpaaai/aicontrol-dashboard:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aicontrol

volumes:
  reports_data:
    external: true

networks:
  aicontrol:
    external: true
    name: aicontrol
