services:
  api:
    image: ghcr.io/alpaaai/aicontrol-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      REPORTS_DIR: /app/reports
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    volumes:
      - reports_data:/app/reports
    healthcheck:
      test: ["CMD-SHELL",
             "python3 -c \"import httpx; httpx.get('http://localhost:8001/health').raise_for_status()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aicontrol

  mcp-gateway:
    image: ghcr.io/alpaaai/aicontrol-api:latest
    restart: unless-stopped
    env_file: .env
    command: ["uvicorn", "enterprise.mcp_gateway.main:gateway_app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    networks:
      - aicontrol

  frontend:
    image: ghcr.io/alpaaai/aicontrol-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aicontrol

networks:
  aicontrol:
    external: true
    name: aicontrol
